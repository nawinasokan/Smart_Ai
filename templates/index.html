<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IdeaDraft — Smart AI Writing Assistant</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet">
  <style>
    /* ─── Design Tokens ──────────────────────────────────────────────────── */
    :root {
      --bg-base: #080a16;
      --bg-card: rgba(255, 255, 255, 0.04);
      --bg-card-hover: rgba(255, 255, 255, 0.07);
      --bg-output: rgba(13, 15, 28, 0.8);
      --border: rgba(255, 255, 255, 0.08);
      --border-lit: rgba(99, 102, 241, 0.5);
      --accent: #6366f1;
      --accent-2: #8b5cf6;
      --accent-3: #06b6d4;
      --text-1: #ffffff;
      --text-2: #cbd5e1;
      --text-3: #64748b;
      --green: #10b981;
      --red: #ef4444;
      --r-sm: 10px;
      --r-md: 16px;
      --r-lg: 24px;
      --ease: cubic-bezier(0.4, 0, 0.2, 1);
      --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    /* ─── Reset ──────────────────────────────────────────────────────────── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    .hidden {
      display: none !important;
    }

    /* ─── Body ───────────────────────────────────────────────────────────── */
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--bg-base);
      color: var(--text-1);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Animated BG Orbs ───────────────────────────────────────────────── */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(90px);
      opacity: 0.12;
    }

    .orb-1 {
      width: 700px;
      height: 700px;
      background: radial-gradient(circle, #6366f1, transparent 70%);
      top: -250px;
      left: -200px;
      animation: drift1 28s infinite ease-in-out;
    }

    .orb-2 {
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, #8b5cf6, transparent 70%);
      bottom: -150px;
      right: -150px;
      animation: drift2 22s infinite ease-in-out;
    }

    .orb-3 {
      width: 400px;
      height: 400px;
      background: radial-gradient(circle, #06b6d4, transparent 70%);
      top: 45%;
      left: 55%;
      animation: drift3 35s infinite ease-in-out;
    }

    @keyframes drift1 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      33% {
        transform: translate(40px, -40px) scale(1.08);
      }

      66% {
        transform: translate(-25px, 35px) scale(0.93);
      }
    }

    @keyframes drift2 {

      0%,
      100% {
        transform: translate(0, 0) scale(1);
      }

      40% {
        transform: translate(-35px, 25px) scale(1.05);
      }

      70% {
        transform: translate(20px, -20px) scale(0.97);
      }
    }

    @keyframes drift3 {

      0%,
      100% {
        transform: translate(-50%, -50%) scale(1);
      }

      50% {
        transform: translate(calc(-50% + 30px), calc(-50% - 30px)) scale(1.1);
      }
    }

    /* Fine grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.018) 1px, transparent 1px);
      background-size: 48px 48px;
    }

    /* ─── Layout ─────────────────────────────────────────────────────────── */
    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px 60px;
    }

    /* ─── Header / Nav ───────────────────────────────────────────────────── */
    .nav {
      width: 100%;
      max-width: 820px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      margin-bottom: 36px;
      padding: 14px 20px;
      background: var(--bg-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      position: sticky;
      top: 16px;
      box-shadow: 0 4px 40px rgba(0, 0, 0, 0.35);
    }

    /* Top rainbow line */
    .nav::before {
      content: '';
      position: absolute;
      top: 0;
      left: 20%;
      right: 20%;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), var(--accent-3), transparent);
      border-radius: 99px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .brand-gem {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border-radius: 9px;
      display: grid;
      place-items: center;
      font-size: 16px;
      box-shadow: 0 0 18px rgba(99, 102, 241, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.15);
      flex-shrink: 0;
    }

    .brand-name {
      font-size: 19px;
      font-weight: 800;
      letter-spacing: -0.5px;
      background: linear-gradient(120deg, #fff 30%, var(--accent-3));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-right {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    /* Daily limit pill */
    #limit-info {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(99, 102, 241, 0.1);
      border: 1px solid rgba(99, 102, 241, 0.22);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: #a5b4fc;
      white-space: nowrap;
    }

    #limit-info::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
      flex-shrink: 0;
    }

    /* Remaining badge */
    #available-count {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      background: rgba(16, 185, 129, 0.08);
      border: 1px solid rgba(16, 185, 129, 0.2);
      border-radius: 99px;
      font-size: 12px;
      font-weight: 600;
      color: #6ee7b7;
      white-space: nowrap;
    }

    #available-count::before {
      content: '';
      width: 6px;
      height: 6px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      flex-shrink: 0;
      animation: pulse-green 2s infinite;
    }

    @keyframes pulse-green {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.7);
      }
    }

    /* User chip */
    .user-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 14px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid var(--border);
      border-radius: 99px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text-2);
    }

    .online-dot {
      width: 7px;
      height: 7px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 8px var(--green);
      animation: pulse-green 2.5s infinite;
    }

    /* Logout */
    .logout-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 16px;
      background: rgba(239, 68, 68, 0.08);
      border: 1px solid rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      font-family: inherit;
      font-size: 13px;
      font-weight: 600;
      border-radius: 99px;
      cursor: pointer;
      text-decoration: none;
      transition: all 0.2s var(--ease);
      white-space: nowrap;
    }

    .logout-btn:hover {
      background: rgba(239, 68, 68, 0.18);
      border-color: rgba(239, 68, 68, 0.4);
      color: #f87171;
      transform: translateY(-1px);
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.2);
    }

    /* ─── Main Card ──────────────────────────────────────────────────────── */
    .card {
      width: 100%;
      max-width: 820px;
      background: var(--bg-card);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 36px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 0 0.5px rgba(255, 255, 255, 0.04) inset, 0 20px 80px rgba(0, 0, 0, 0.4);
    }

    /* Top accent line */
    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent 5%, var(--accent) 40%, var(--accent-2) 60%, transparent 95%);
    }

    /* ─── Section Label ──────────────────────────────────────────────────── */
    .label {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 1.8px;
      text-transform: uppercase;
      color: var(--text-3);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
    }

    /* ─── Mode Selector ──────────────────────────────────────────────────── */
    .modes {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
      margin-bottom: 32px;
    }

    /* Hidden native select — still used by JS */
    #mode {
      display: none;
    }

    .mode-btn {
      position: relative;
      padding: 14px 8px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-2);
      font-family: inherit;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.2px;
      cursor: pointer;
      transition: all 0.22s var(--ease);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 7px;
      overflow: hidden;
    }

    .mode-btn .mi {
      font-size: 22px;
      line-height: 1;
      transition: transform 0.25s var(--spring);
    }

    .mode-btn:hover {
      background: rgba(99, 102, 241, 0.08);
      border-color: rgba(99, 102, 241, 0.3);
      color: #c7d2fe;
      transform: translateY(-2px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.12);
    }

    .mode-btn:hover .mi {
      transform: scale(1.15) translateY(-1px);
    }

    .mode-btn.active {
      background: rgba(99, 102, 241, 0.13);
      border-color: var(--accent);
      color: #e0e7ff;
      box-shadow: 0 0 0 1px rgba(99, 102, 241, 0.25), 0 6px 30px rgba(99, 102, 241, 0.18);
    }

    .mode-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
    }

    /* ─── Prompt Textarea ────────────────────────────────────────────────── */
    .prompt-wrap {
      position: relative;
      margin-bottom: 20px;
    }

    #prompt {
      width: 100%;
      min-height: 148px;
      background: rgba(255, 255, 255, 0.025);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-1);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.75;
      padding: 18px 20px 42px;
      resize: vertical;
      outline: none;
      transition: all 0.25s var(--ease);
      caret-color: var(--accent-3);
    }

    #prompt::placeholder {
      color: var(--text-3);
      font-style: italic;
    }

    #prompt:focus {
      border-color: rgba(99, 102, 241, 0.5);
      background: rgba(99, 102, 241, 0.035);
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1), 0 8px 40px rgba(99, 102, 241, 0.06);
    }

    .prompt-hint {
      position: absolute;
      bottom: 13px;
      right: 16px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      color: var(--text-3);
      pointer-events: none;
    }

    .kbd {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-bottom-width: 2px;
      border-radius: 4px;
      padding: 1px 6px;
      font-size: 10px;
      font-weight: 600;
      font-family: inherit;
      color: var(--text-3);
    }

    /* ─── Actions Row ────────────────────────────────────────────────────── */
    .actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    /* Generate button */
    .gen-btn {
      position: relative;
      padding: 14px 36px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 100%);
      border: none;
      border-radius: var(--r-sm);
      color: #fff;
      font-family: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.2px;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.25s var(--ease);
      box-shadow: 0 4px 24px rgba(99, 102, 241, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.15);
    }

    .gen-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0);
      transition: background 0.2s;
    }

    .gen-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 40px rgba(99, 102, 241, 0.55), 0 0 80px rgba(99, 102, 241, 0.15), inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    .gen-btn:hover::before {
      background: rgba(255, 255, 255, 0.07);
    }

    .gen-btn:active {
      transform: translateY(1px);
      box-shadow: 0 3px 16px rgba(99, 102, 241, 0.4);
    }

    /* Shine sweep */
    .gen-btn .shine {
      position: absolute;
      top: 0;
      bottom: 0;
      left: -80%;
      width: 40%;
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.25), transparent);
      transform: skewX(-20deg);
      animation: sweep 4s infinite;
    }

    @keyframes sweep {
      0% {
        left: -80%;
        opacity: 0;
      }

      10% {
        opacity: 1;
      }

      30%,
      100% {
        left: 140%;
        opacity: 0;
      }
    }

    /* ─── Loading Indicator ──────────────────────────────────────────────── */
    #loading {
      display: flex;
      align-items: center;
      gap: 18px;
      padding: 22px 24px;
      background: rgba(99, 102, 241, 0.05);
      border: 1px solid rgba(99, 102, 241, 0.14);
      border-radius: var(--r-md);
      margin-top: 22px;
    }

    .spinner {
      position: relative;
      width: 44px;
      height: 44px;
      flex-shrink: 0;
    }

    .spinner span {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2.5px solid transparent;
    }

    .spinner span:nth-child(1) {
      border-top-color: var(--accent);
      animation: spin 1.1s linear infinite;
    }

    .spinner span:nth-child(2) {
      inset: 7px;
      border-top-color: var(--accent-2);
      animation: spin 0.75s linear infinite reverse;
    }

    .spinner span:nth-child(3) {
      inset: 14px;
      border-top-color: var(--accent-3);
      animation: spin 0.5s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .loading-info {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .loading-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-1);
    }

    #loading-text {
      font-size: 12px;
      color: var(--text-3);
      transition: opacity 0.4s;
    }

    /* Loading dots animation */
    .loading-dots {
      display: flex;
      gap: 5px;
      margin-top: 4px;
    }

    .loading-dots span {
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce-dot 1.2s infinite ease-in-out;
    }

    .loading-dots span:nth-child(2) {
      animation-delay: 0.2s;
    }

    .loading-dots span:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes bounce-dot {

      0%,
      80%,
      100% {
        transform: scale(0.6);
        opacity: 0.4;
      }

      40% {
        transform: scale(1);
        opacity: 1;
      }
    }

    /* ─── Output Area ────────────────────────────────────────────────────── */
    .output-section {
      position: relative;
      margin-top: 22px;
    }

    #output {
      background: rgb(57 53 47);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      min-height: 160px;
      position: relative;
      transition: all 0.4s var(--ease);
      overflow: hidden;
      box-shadow: 0 4px 30px rgba(0, 0, 0, 0.3);
    }

    #output.has-content {
      border-color: var(--border-lit);
      box-shadow: 0 0 50px rgba(99, 102, 241, 0.12), 0 0 0 1px rgba(99, 102, 241, 0.2);
    }

    /* Empty state */
    .output-empty {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--text-3);
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .output-empty.fade-out {
      opacity: 0;
    }

    .output-empty svg {
      opacity: 0.25;
    }

    .output-empty p {
      font-size: 13px;
      font-style: italic;
    }

    /* Output text */
    #output-text {
      padding: 24px;
      font-size: 15px;
      line-height: 1.8;
      color: var(--text-1);
      white-space: pre-wrap;
      font-family: inherit;
      opacity: 0;
      transform: translateY(10px);
      transition: all 0.5s var(--ease);
    }

    #output-text.show {
      opacity: 1;
      transform: translateY(0);
    }

    #output-text.code-mode {
      font-family: 'JetBrains Mono', 'Fira Code', monospace;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.2);
    }

    /* Output action buttons */
    .out-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 6px;
    }

    #copy,
    #clear {
      width: 32px;
      height: 32px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s var(--ease);
      color: var(--text-2);
    }

    #copy:hover {
      background: rgba(99, 102, 241, 0.18);
      border-color: rgba(99, 102, 241, 0.4);
      color: #a5b4fc;
      box-shadow: 0 0 16px rgba(99, 102, 241, 0.25);
      transform: scale(1.08);
    }

    #clear:hover {
      background: rgba(239, 68, 68, 0.18);
      border-color: rgba(239, 68, 68, 0.4);
      color: #fca5a5;
      box-shadow: 0 0 16px rgba(239, 68, 68, 0.2);
      transform: scale(1.08);
    }

    /* ─── Toast ──────────────────────────────────────────────────────────── */
    #toast-zone {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-end;
    }

    .toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 18px;
      background: rgba(10, 12, 25, 0.96);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r-sm);
      color: var(--text-1);
      font-size: 13px;
      font-weight: 500;
      box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5), 0 0 0 0.5px rgba(255, 255, 255, 0.04);
      animation: toast-in 0.35s var(--spring) forwards;
      max-width: 290px;
    }

    .toast.out {
      animation: toast-out 0.25s var(--ease) forwards;
    }

    .t-icon {
      font-size: 15px;
      flex-shrink: 0;
    }

    @keyframes toast-in {
      from {
        opacity: 0;
        transform: translateX(18px) scale(0.93);
      }

      to {
        opacity: 1;
        transform: translateX(0) scale(1);
      }
    }

    @keyframes toast-out {
      from {
        opacity: 1;
        transform: translateX(0) scale(1);
      }

      to {
        opacity: 0;
        transform: translateX(14px) scale(0.95);
      }
    }

    /* ─── Scrollbar ──────────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 99px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* ─── Responsive ─────────────────────────────────────────────────────── */
    @media (max-width: 680px) {
      .card {
        padding: 22px 18px;
      }

      .nav {
        padding: 12px 16px;
      }

      .modes {
        grid-template-columns: repeat(3, 1fr);
      }

      .brand-name {
        font-size: 16px;
      }

      .gen-btn {
        padding: 13px 24px;
        font-size: 14px;
      }
    }

    @media (max-width: 420px) {
      .modes {
        grid-template-columns: repeat(2, 1fr);
      }

      .user-chip .chip-name {
        display: none;
      }
    }
  </style>
</head>

<body>

  <!-- ─── Animated Background ──────────────────────────────────────────── -->
  <div class="bg-scene" aria-hidden="true">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>
  <div class="grid-overlay" aria-hidden="true"></div>

  <!-- ─── Page ─────────────────────────────────────────────────────────── -->
  <div class="page">

    <!-- Nav -->
    <nav class="nav">
      <div class="brand">
        <div class="brand-gem">✦</div>
        <span class="brand-name">IdeaDraft</span>
      </div>

      <div class="nav-right">
        <div id="limit-info">Daily Limit: 3</div>
        <div id="available-count" class="hidden">Remaining Generations: 0</div>
        <div class="user-chip">
          <div class="online-dot"></div>
          <span class="chip-name">{{ name }}</span>
        </div>
        <a href="/logout" class="logout-btn">
          <svg width="13" height="13" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" />
          </svg>
          Sign out
        </a>
      </div>
    </nav>

    <!-- Main Card -->
    <main class="card">

      <!-- Mode selector -->
      <div style="margin-bottom: 30px;">
        <p class="label">Generation Mode</p>
        <div class="modes" id="modes">
          <button type="button" class="mode-btn" data-value="email" onclick="selectMode('email')">
            <span class="mi">✉️</span>Email
          </button>
          <button type="button" class="mode-btn" data-value="blog" onclick="selectMode('blog')">
            <span class="mi">📝</span>Blog
          </button>
          <button type="button" class="mode-btn" data-value="code" onclick="selectMode('code')">
            <span class="mi">💻</span>Code
          </button>
          <button type="button" class="mode-btn" data-value="summary" onclick="selectMode('summary')">
            <span class="mi">📋</span>Summary
          </button>
          <button type="button" class="mode-btn" data-value="custom" onclick="selectMode('custom')">
            <span class="mi">✨</span>Custom
          </button>
        </div>
        <!-- Hidden select kept intact for backend JS logic -->
        <select id="mode">
          <option value="">-- Select --</option>
          <option value="email">Email</option>
          <option value="blog">Blog</option>
          <option value="code">Code</option>
          <option value="summary">Summary</option>
          <option value="custom">Custom</option>
        </select>
      </div>

      <!-- Prompt -->
      <div style="margin-bottom: 22px;">
        <p class="label">Your Prompt</p>
        <div class="prompt-wrap">
          <textarea id="prompt"
            placeholder="Describe what you want to generate… be as detailed as you like."></textarea>
          <div class="prompt-hint">
            <span class="kbd">↵ Enter</span>&nbsp;generate &nbsp;·&nbsp;
            <span class="kbd">⇧ Shift+Enter</span>&nbsp;new line
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div class="actions">
        <button type="button" onclick="generate()" class="gen-btn">
          <span class="shine" aria-hidden="true"></span>
          Generate ✦
        </button>
      </div>

      <!-- Loading -->
      <div id="loading" class="hidden">
        <div class="spinner" aria-hidden="true">
          <span></span><span></span><span></span>
        </div>
        <div class="loading-info">
          <span class="loading-title">Thinking…</span>
          <span id="loading-text">Initializing...</span>
          <div class="loading-dots" aria-hidden="true">
            <span></span><span></span><span></span>
          </div>
        </div>
      </div>

      <!-- Output -->
      <div class="output-section">
        <div id="output">
          <div class="output-empty" id="out-empty">
            <svg width="36" height="36" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.2">
              <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z" />
            </svg>
            <p>Generated content will appear here</p>
          </div>

          <pre id="output-text" class="hidden"></pre>

          <div class="out-actions">
            <button id="copy" class="hidden" onclick="copyOutput()" title="Copy to clipboard" type="button">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <rect x="9" y="9" width="13" height="13" rx="2" />
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" />
              </svg>
            </button>
            <button id="clear" class="hidden" onclick="clearOutput()" title="Clear output" type="button">
              <svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path d="M6 18L18 6M6 6l12 12" />
              </svg>
            </button>
          </div>
        </div>
      </div>

    </main>
  </div>

  <!-- Toast zone -->
  <div id="toast-zone" aria-live="polite"></div>

  <!-- ─── Scripts ───────────────────────────────────────────────────────── -->
  <script>
    /* ── Mode selector (new UI helper — syncs hidden <select>) ───────────── */
    function selectMode(value) {
      document.getElementById("mode").value = value;
      document.querySelectorAll(".mode-btn").forEach(function (btn) {
        btn.classList.toggle("active", btn.dataset.value === value);
      });
    }

    /* ── Loading text cycle ───────────────────────────────────────────────── */
    var loadingInterval;

    function startLoadingTextCycle() {
      var messages = ["Initializing...", "Generating response...", "Finalizing..."];
      var index = 0;
      var loadingText = document.getElementById("loading-text");

      loadingText.innerText = messages[index];
      loadingInterval = setInterval(function () {
        index = (index + 1) % messages.length;
        loadingText.innerText = messages[index];
      }, 3000);
    }

    function stopLoadingTextCycle() {
      clearInterval(loadingInterval);
    }

    /* ── Generate ─────────────────────────────────────────────────────────── */
    async function generate() {
      var prompt = document.getElementById("prompt").value.trim();
      var mode = document.getElementById("mode").value;
      var outputText = document.getElementById("output-text");
      var output = document.getElementById("output");
      var loading = document.getElementById("loading");
      var copy = document.getElementById("copy");
      var clear = document.getElementById("clear");
      var AvailableCount = document.getElementById("available-count");

      if (!mode) return showToast("Please select a mode.", "⚠️");
      if (!prompt) return showToast("Please enter a prompt.", "⚠️");

      outputText.innerText = "";
      output.classList.remove("has-content");
      document.getElementById("out-empty").classList.remove("fade-out");
      loading.classList.remove("hidden");
      startLoadingTextCycle(); // Start text cycle

      var res = await fetch("/generate", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ prompt: prompt, mode: mode })
      });

      if (!res.ok) {
        stopLoadingTextCycle();
        loading.classList.add("hidden");
        showToast("Server error: " + res.status, "❌");
        return;
      }

      var data = await res.json();
      stopLoadingTextCycle(); // Stop text cycle
      copy.classList.remove("hidden");
      clear.classList.remove("hidden");
      loading.classList.add("hidden");
      outputText.classList.remove("hidden");
      AvailableCount.classList.remove("hidden");
      document.getElementById("out-empty").classList.add("fade-out");
      output.classList.add("has-content");

      outputText.innerText = data.response;

      // Apply visibility and specific mode styles
      outputText.classList.remove("hidden");
      setTimeout(() => outputText.classList.add("show"), 10);

      if (mode === "code") {
        outputText.classList.add("code-mode");
      } else {
        outputText.classList.remove("code-mode");
      }

      console.log(data);

      document.getElementById("available-count").innerText = "Remaining Generations: " + data.remaining;

      if (data.limitExceeded) {
        showToast("Generation limit reached.", "🚫");
      } else {
        showToast("Content generated successfully!", "✅");
      }
    }

    /* ── Keyboard shortcut — Enter to generate ────────────────────────────── */
    document.addEventListener("DOMContentLoaded", function () {
      var promptField = document.getElementById("prompt");
      promptField.addEventListener("keydown", function (e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          generate();
        }
      });
    });

    /* ── Copy output ──────────────────────────────────────────────────────── */
    function copyOutput() {
      var text = document.getElementById("output").innerText;
      if (!text) return;
      navigator.clipboard.writeText(text);
      showToast("Copied to clipboard!", "📋");
    }

    /* ── Clear output ─────────────────────────────────────────────────────── */
    function clearOutput() {
      var outputText = document.getElementById("output-text");
      outputText.classList.add("hidden");
      outputText.classList.remove("show");
      outputText.classList.remove("code-mode");
      document.getElementById("copy").classList.add("hidden");
      document.getElementById("clear").classList.add("hidden");
      document.getElementById("output").classList.remove("has-content");
      document.getElementById("out-empty").classList.remove("fade-out");
      showToast("Output cleared.", "🗑️");
    }

    /* ── Toast system ─────────────────────────────────────────────────────── */
    function showToast(msg, icon) {
      icon = icon || "ℹ️";
      var zone = document.getElementById("toast-zone");
      var toast = document.createElement("div");
      toast.className = "toast";
      toast.innerHTML = '<span class="t-icon">' + icon + '</span><span>' + msg + '</span>';
      zone.appendChild(toast);
      setTimeout(function () {
        toast.classList.add("out");
        setTimeout(function () { toast.remove(); }, 280);
      }, 2800);
    }
  </script>
</body>

</html>
